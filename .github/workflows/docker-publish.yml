name: Build Docker Image

on:
  push:
    tags:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B package --file pom.xml

      - name: Set up build args
        run: |
          echo "MAJOR_VERSION=${GITHUB_REF_NAME%%.*}" >> $GITHUB_ENV
          echo "MINOR_VERSION=${GITHUB_REF_NAME%.*}" >> $GITHUB_ENV
          echo "BUILD_VERSION=${GITHUB_REF_NAME%-*}" >> $GITHUB_ENV
          echo "TAG_VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date +"%Y-%m-%d")" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/kkfileview:${{ env.MAJOR_VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/kkfileview:${{ env.MINOR_VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/kkfileview:${{ env.BUILD_VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/kkfileview:${{ env.TAG_VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/kkfileview:latest
          build-args: |
            VERSION=${{ env.BUILD_VERSION }}
            BUILD_DATE=${{ env.BUILD_DATE }}

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}